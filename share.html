    function getById(id) {
      return window.APP_DATA.find(item => item.structure.id === parseInt(id));
    }

    function shareTo(platform) {
      const id = new URLSearchParams(location.search).get('id');
      const data = getById(id);
      if (data) {
        const url = `result.html?id=${data.structure.id}`;
        switch (platform) {
          case 'wechat':
            alert(`请复制链接 ${url} 分享到微信`);
            break;
          case 'weibo':
            alert(`请复制链接 ${url} 分享到微博`);
            break;
          case 'qq':
            alert(`请复制链接 ${url} 分享到QQ`);
            break;
          case 'facebook':
            alert(`请复制链接 ${url} 分享到Facebook`);
            break;
          case 'twitter':
            alert(`请复制链接 ${url} 分享到Twitter`);
            break;
          default:
            console.log('Unknown platform');
        }
      } else {
        console.log('Data not found');
      }
    }

    function returnToResult() {
      const id = new URLSearchParams(location.search).get('id');
      location.href = `result.html?id=${id}`;
    }
