<body>
    <div class="container">
        <div class="header">
            <h1>二维码生成器</h1>
        </div>
        <div class="nav">
            <a href="index.html">首页</a>
            <a href="generate.html">生成二维码</a>
            <a href="history.html">生成历史</a>
            <a href="settings.html">设置</a>
            <a href="about.html">关于</a>
            <a href="help.html">帮助</a>
        </div>
        <div class="content">
            <h2>设置</h2>
            <form id="settingsForm">
                <div class="form-group">
                    <label for="color">二维码颜色:</label>
                    <input type="color" id="color" name="color" value="#000000">
                </div>
                <div class="form-group">
                    <label for="background">背景颜色:</label>
                    <input type="color" id="background" name="background" value="#FFFFFF">
                </div>
                <div class="form-group">
                    <label for="size">二维码大小:</label>
                    <select id="size" name="size">
                        <option value="100x100">100x100</option>
                        <option value="200x200" selected>200x200</option>
                        <option value="300x300">300x300</option>
                        <option value="400x400">400x400</option>
                        <option value="500x500">500x500</option>
                    </select>
                </div>
                <button type="submit" class="btn">保存</button>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const settingsForm = document.getElementById('settingsForm');
            const colorInput = document.getElementById('color');
            const backgroundInput = document.getElementById('background');
            const sizeSelect = document.getElementById('size');

            // 从URL参数获取ID
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // 根据ID获取二维码数据
            const getById = (id) => {
                return window.APP_DATA.find(item => item.structure.id.toString() === id);
            };

            // 如果有ID，则加载对应的二维码数据
            if (id) {
                const qrCodeData = getById(id);
                if (qrCodeData) {
                    colorInput.value = qrCodeData.structure.color;
                    backgroundInput.value = qrCodeData.structure.background;
                    sizeSelect.value = qrCodeData.structure.size;
                }
            }

            // 表单提交处理
            settingsForm.addEventListener('submit', function(event) {
                event.preventDefault();

                // 获取表单数据
                const color = colorInput.value;
                const background = backgroundInput.value;
                const size = sizeSelect.value;

                // 如果有ID，则更新对应的二维码数据
                if (id) {
                    const qrCodeData = getById(id);
                    if (qrCodeData) {
                        qrCodeData.structure.color = color;
                        qrCodeData.structure.background = background;
                        qrCodeData.structure.size = size;
                    }
                }

                // 跳转到generate.html
                window.location.href = 'generate.html';
            });
        });
    </script>
</body>
