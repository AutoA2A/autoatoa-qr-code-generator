<body>
<header>
    <nav>
        <div class="logo">二维码生成器</div>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="generate.html">生成二维码</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="intro">
        <h1>欢迎使用二维码生成器</h1>
        <p>在这里，您可以快速生成自定义的二维码，支持颜色、背景、大小等参数调节。</p>
    </section>

    <section class="generator">
        <h2>生成您的二维码</h2>
        <div class="form-group">
            <label for="content">二维码内容</label>
            <input type="text" id="content" placeholder="例如：https://www.example.com">
        </div>
        <div class="form-group">
            <label for="color">前景色</label>
            <input type="text" id="color" value="#000000" placeholder="#FF5733">
        </div>
        <div class="form-group">
            <label for="background">背景色</label>
            <input type="text" id="background" value="#FFFFFF" placeholder="#FFFFFF">
        </div>
        <div class="form-group">
            <label for="size">大小（如 300x300）</label>
            <input type="text" id="size" value="200x200" placeholder="300x300">
        </div>
        <button id="generateBtn">生成二维码</button>
        <div id="qrcodeOutput" style="margin-top:2rem; text-align:center;"></div>
    </section>
</main>

<script>
/* 使用已注入的 window.APP_DATA，不重复定义 */
(function(d){
    try{
        if(Array.isArray(d)){
            ["items","list","data","records","rows","all","results","content"].forEach(function(k){
                try{if(d[k]===undefined)d[k]=d;}catch(e){}
            });
        }
        window.APP_LIST = Array.isArray(d) ? d : [];
        window.getById = function(id){
            return window.APP_LIST.find(function(x){return x && String(x.id)===String(id);}) || null;
        };
    }catch(e){}
})(window.APP_DATA);

/* 示例：生成二维码（可使用任何二维码库，这里仅作演示） */
document.getElementById('generateBtn').addEventListener('click', function(){
    const content = document.getElementById('content').value.trim();
    const color = document.getElementById('color').value.trim() || '#000000';
    const background = document.getElementById('background').value.trim() || '#FFFFFF';
    const size = document.getElementById('size').value.trim() || '200x200';
    if(!content){
        alert('请输入二维码内容');
        return;
    }
    const [w, h] = size.split('x').map(Number);
    const output = document.getElementById('qrcodeOutput');
    output.innerHTML = ''; // 清空
    // 这里使用一个简单的在线 API 生成二维码图片（仅示例）
    const apiUrl = `https://api.qrserver.com/v1/create-qr-code/?size=${w}x${h}&data=${encodeURIComponent(content)}&color=${color}&bgcolor=${background}`;
    const img = document.createElement('img');
    img.src = apiUrl;
    img.alt = '生成的二维码';
    output.appendChild(img);
});
</script>
