            <div id="history-list"></div>
            <a href="index.html" class="btn" style="margin-top: 20px;">返回首页</a>
        </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const historyList = document.getElementById('history-list');

            if (window.APP_DATA && window.APP_DATA.length > 0) {
                window.APP_DATA.forEach(item => {
                    const historyItem = document.createElement('div');
                    historyItem.className = 'history-item';

                    const link = document.createElement('a');
                    link.href = `result.html?id=${item.structure.id}`;
                    link.textContent = item.structure.content;

                    const details = document.createElement('div');
                    details.className = 'history-details';

                    const date = document.createElement('span');
                    date.className = 'history-date';
                    date.textContent = `生成日期: ${item.structure.date}`;

                    details.appendChild(link);
                    details.appendChild(date);

                    historyItem.appendChild(details);
                    historyList.appendChild(historyItem);
                });
            } else {
                historyList.innerHTML = '<p>暂无生成历史</p>';
            }
        });
    </script>
